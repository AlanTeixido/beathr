<svg width="100%" viewBox="0 0 680 200" style="background:#0a0a0a; border-radius:12px;" xmlns="http://www.w3.org/2000/svg">
  <defs>
    
  </defs>

  <!-- ECG wave line -->
  <polyline points="80,100 120,100 135,100 145,60 158,140 170,80 182,100 220,100" fill="none" stroke="#4ade80" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round" style="fill:none;stroke:rgb(74, 222, 128);color:rgb(255, 255, 255);stroke-width:2.5px;stroke-linecap:round;stroke-linejoin:round;opacity:1;font-family:&quot;Anthropic Sans&quot;, -apple-system, BlinkMacSystemFont, &quot;Segoe UI&quot;, sans-serif;font-size:16px;font-weight:400;text-anchor:start;dominant-baseline:auto"/>

  <!-- Dot pulse at end -->
  <circle cx="220" cy="100" r="4" fill="#4ade80" opacity="0.9" style="fill:rgb(74, 222, 128);stroke:none;color:rgb(255, 255, 255);stroke-width:1px;stroke-linecap:butt;stroke-linejoin:miter;opacity:0.9;font-family:&quot;Anthropic Sans&quot;, -apple-system, BlinkMacSystemFont, &quot;Segoe UI&quot;, sans-serif;font-size:16px;font-weight:400;text-anchor:start;dominant-baseline:auto"/>
  <circle cx="220" cy="100" r="8" fill="none" stroke="#4ade80" stroke-width="1" opacity="0.4" style="fill:none;stroke:rgb(74, 222, 128);color:rgb(255, 255, 255);stroke-width:1px;stroke-linecap:butt;stroke-linejoin:miter;opacity:0.4;font-family:&quot;Anthropic Sans&quot;, -apple-system, BlinkMacSystemFont, &quot;Segoe UI&quot;, sans-serif;font-size:16px;font-weight:400;text-anchor:start;dominant-baseline:auto"/>

  <!-- beathr text -->
  <text x="248" y="116" font-family="DM Sans, sans-serif" font-size="52" font-weight="700" letter-spacing="-2" fill="#f0ede8" style="fill:rgb(240, 237, 232);stroke:none;color:rgb(255, 255, 255);stroke-width:1px;stroke-linecap:butt;stroke-linejoin:miter;opacity:1;font-family:&quot;DM Sans&quot;, sans-serif;font-size:52px;font-weight:700;text-anchor:start;dominant-baseline:auto">beat<tspan fill="#4ade80" style="fill:rgb(74, 222, 128);stroke:none;color:rgb(255, 255, 255);stroke-width:1px;stroke-linecap:butt;stroke-linejoin:miter;opacity:1;font-family:&quot;DM Sans&quot;, sans-serif;font-size:52px;font-weight:700;text-anchor:start;dominant-baseline:auto">hr</tspan></text>

  <!-- tagline -->
  <text x="250" y="148" font-family="DM Sans, sans-serif" font-size="13" font-weight="300" letter-spacing="2" fill="#5a5652" style="fill:rgb(90, 86, 82);stroke:none;color:rgb(255, 255, 255);stroke-width:1px;stroke-linecap:butt;stroke-linejoin:miter;opacity:1;font-family:&quot;DM Sans&quot;, sans-serif;font-size:13px;font-weight:300;text-anchor:start;dominant-baseline:auto">RECOVERY INTELLIGENCE</text>
</svg>